<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Breyya</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a1628;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
            padding: 40px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            backdrop-filter: blur(10px);
        }

        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 12px;
        }

        .message {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .redirect-info {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #22c55e;
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .password-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .setup-btn {
            width: 100%;
            padding: 16px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 24px;
        }

        .setup-btn:hover {
            background: #16a34a;
        }

        .setup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .manual-link {
            display: inline-block;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.2s;
            font-size: 14px;
        }

        .manual-link:hover {
            background: #2563eb;
        }

        .error {
            color: #ef4444;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .loading-dots {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #94a3b8;
            animation: loading 1.4s infinite both;
            margin-left: 4px;
        }

        .loading-dots:nth-child(1) { animation-delay: 0s; }
        .loading-dots:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loading {
            0%, 80%, 100% { 
                opacity: 0.4;
                transform: scale(0.8);
            }
            40% { 
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20,6 9,17 4,12"></polyline>
            </svg>
        </div>
        
        <h1>Payment Successful!</h1>
        <p class="message">You're in! Just create a password to access your account.</p>
        
        <!-- Password setup form -->
        <form id="setupForm">
            <div class="form-group">
                <label>Email used to pay</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Create a password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="password-hint">Minimum 8 characters</div>
            </div>
            <button type="submit" class="setup-btn" id="setupBtn">CREATE ACCOUNT</button>
            <p class="error" id="errorMsg"></p>
        </form>
        
        <!-- Fallback link -->
        <a href="/chat" class="manual-link">Continue to Chat</a>
    </div>

    <script>
        // Handle password setup form
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('setupBtn');
            const errorEl = document.getElementById('errorMsg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (password.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'CREATING...';
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/setup-password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.ok && data.token) {
                    // Store token and redirect
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/chat';
                } else {
                    errorEl.textContent = data.error || 'Setup failed. Please try again.';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = 'CREATE ACCOUNT';
        });
    </script>
</body>
</html>
