<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Breyya</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a1628;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
            padding: 40px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            backdrop-filter: blur(10px);
        }

        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 12px;
        }

        .message {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .redirect-info {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 32px;
        }

        .manual-link {
            display: inline-block;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .manual-link:hover {
            background: #2563eb;
        }

        .loading-dots {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #94a3b8;
            animation: loading 1.4s infinite both;
            margin-left: 4px;
        }

        .loading-dots:nth-child(1) { animation-delay: 0s; }
        .loading-dots:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loading {
            0%, 80%, 100% { 
                opacity: 0.4;
                transform: scale(0.8);
            }
            40% { 
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20,6 9,17 4,12"></polyline>
            </svg>
        </div>
        
        <h1>Payment Successful!</h1>
        <p class="message">Your payment has been processed successfully. Welcome to Breyya!</p>
        
        <p class="redirect-info" id="redirect-text">
            Redirecting to chat in <span id="countdown">3</span> seconds
            <span class="loading-dots"></span>
            <span class="loading-dots"></span>
            <span class="loading-dots"></span>
        </p>
        
        <a href="/chat" class="manual-link">Continue to Chat</a>
    </div>

    <script>
        let countdown = 3;
        const countdownElement = document.getElementById('countdown');
        const redirectTextElement = document.getElementById('redirect-text');
        
        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown === 0) {
                clearInterval(timer);
                redirectTextElement.textContent = 'Redirecting now...';
                window.location.href = '/chat';
            }
        }, 1000);

        // Also redirect if user was idle and countdown completed
        setTimeout(() => {
            if (countdown <= 0) {
                window.location.href = '/chat';
            }
        }, 3500);
    </script>
</body>
</html>
